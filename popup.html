<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body { font-family: 'Segoe UI', sans-serif; width: 240px; padding: 14px; margin: 0; background: #1e1e1e; color: #ddd; }
  h2   { font-size: 14px; font-weight: 600; margin: 0 0 10px; color: #fff; }
  p    { font-size: 12px; color: #aaa; margin: 0 0 10px; line-height: 1.5; }
  button {
    width: 100%; padding: 8px 12px; font-size: 13px; cursor: pointer;
    background: #2563eb; color: #fff; border-radius: 6px;
    border: none; margin-bottom: 8px;
  }
  button:hover { background: #1d4ed8; }
  .hint { font-size: 11px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<h2>📊 XPPT Viewer</h2>
<p>Click a <code>.pptx</code> link in any page and XPPT intercepts it automatically.</p>
<button id="open-viewer">📂 Open .pptx file…</button>
<p class="hint">Opens the viewer — then use the file picker inside to load your file.</p>
<script src="popup.js"></script>
</body>
</html>
